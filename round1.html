 <!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="style.css">

  body {
      font-family: 'Press Start 2P';font-size: 22px;

<!-- ROUND ONE PAGE -->
<body>
    <h1>ROUND 01</h1>
    <div class="round-block">
      <div class="round-card">
        <h2>SUPPLIER TROUBLES!</h2>
        <p>Oh no! Something happened to your supplier, and now you must decide...</p>
        <a class="btn" onclick="makeDecision('A')">Decision A</a>
        <a class="btn" onclick="makeDecision('B')">Decision B</a>
        <a class="btn" onclick="makeDecision('C')">Decision C</a>
      </div>
      <div class="scores">
        <h1> SCORES </h1>
        <div>E: <span id="scoreE">50</span></div>
        <div>S: <span id="scoreS">50</span></div>
        <div>G: <span id="scoreG">50</span></div>
        <div>Profit: $<span id="profit">1,000,000</span></div>
      </div>
    </div>
    <a href="round2.html" class="btn" >Continue </a>

      <script src="script.js"></script>
</body>
</html>
