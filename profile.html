 <!DOCTYPE html>

<body> 
 
 <!-- PROFILE PAGE -->
    <h1>Profile </h1>
    <p>Let's set up your CEO details and your industry of choice:</p>
    <div class="profile-card"> 
    <form onsubmit="startGame(event)">
      <input type="text" placeholder="Your CEO Name" id="ceoName" required /><br><br>
        <select id="industry" name="industry" required>
          <option value="" disabled selected> Your industry</option>
          <option value="fashion">Fashion</option>
          <option value="food">Food Retail</option>
          <option value="tech">Tech</option>
        </select>
    <br><br>
      <input type="text" placeholder="Your Company Name" id="company" required /><br><br>
      <a href='round1.html' class="btn">Continue</button>
    </form>
    </div>

    <script src="script.js"></script>

</body>
</html>
